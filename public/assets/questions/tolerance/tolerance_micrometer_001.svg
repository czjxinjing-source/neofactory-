<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="760" height="460" viewBox="0 0 760 460">
  <rect width="760" height="460" fill="#fff"/>
  <style>
    .l{fill:none;stroke:#111;stroke-width:3;stroke-linecap:round;stroke-linejoin:round}
    .d{fill:none;stroke:#111;stroke-width:1.5;stroke-linecap:round}
    .dash{fill:none;stroke:#111;stroke-width:1.4;stroke-dasharray:7 5}
    .t{font-family:Arial,'Microsoft YaHei',sans-serif;font-size:21px;fill:#111}
    .s{font-family:Arial,'Microsoft YaHei',sans-serif;font-size:17px;fill:#111}
  </style>
  <text x="34" y="36" class="t">外径千分尺读数 12.86 mm</text>
  
    <rect x="130" y="180" width="260" height="70" class="l"/>
    <line x1="160" y1="170" x2="160" y2="260" class="d"/><text x="146" y="285" class="s">12</text>
    <line x1="230" y1="170" x2="230" y2="260" class="d"/><text x="212" y="285" class="s">12.5</text>
    <circle cx="500" cy="215" r="72" class="l"/>
    <line x1="500" y1="215" x2="575" y2="215" class="d"/><text x="585" y="221" class="s">36</text>
    <text x="355" y="145" class="s">主尺 12.5 mm，微分筒 36 格</text>
  
  <text x="34" y="426" class="s">读数为 12.5 + 0.36 = 12.86 mm。</text>
</svg>