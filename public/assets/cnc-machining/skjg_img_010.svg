  <text x="36" y="36" class="txt">三孔孔系坐标</text>
  
  <rect x="130" y="125" width="460" height="250" class="obj"/>
  <circle cx="235" cy="250" r="25" class="obj"/><line x1="203" y1="250" x2="267" y2="250" class="ctr"/><line x1="235" y1="218" x2="235" y2="282" class="ctr"/>
  <circle cx="360" cy="250" r="25" class="obj"/><line x1="328" y1="250" x2="392" y2="250" class="ctr"/><line x1="360" y1="218" x2="360" y2="282" class="ctr"/>
  <circle cx="485" cy="250" r="25" class="obj"/><line x1="453" y1="250" x2="517" y2="250" class="ctr"/><line x1="485" y1="218" x2="485" y2="282" class="ctr"/>
  <text x="198" y="210" class="small">X20</text><text x="323" y="210" class="small">X40</text><text x="448" y="210" class="small">X60</text>
  <text x="602" y="256" class="small">Y25</text><text x="130" y="110" class="small">80 x 50</text>

