<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="760" height="460" viewBox="0 0 760 460">
  <rect width="760" height="460" fill="#fff"/>
  <style>
    .obj{fill:none;stroke:#111;stroke-width:3;stroke-linejoin:round;stroke-linecap:round}
    .dim{fill:none;stroke:#111;stroke-width:1.4;stroke-linecap:round}
    .ctr{fill:none;stroke:#111;stroke-width:1.2;stroke-dasharray:8 6}
    .txt{font-family:Arial,'Microsoft YaHei',sans-serif;font-size:20px;fill:#111}
    .small{font-family:Arial,'Microsoft YaHei',sans-serif;font-size:16px;fill:#111}
  </style>
  <text x="36" y="36" class="txt">两个对称孔定位</text>
  
  <rect x="130" y="125" width="430" height="245" class="obj"/>
  <circle cx="253" cy="248" r="28" class="obj"/><circle cx="437" cy="248" r="28" class="obj"/>
  <line x1="253" y1="215" x2="253" y2="282" class="ctr"/><line x1="220" y1="248" x2="286" y2="248" class="ctr"/>
  <line x1="437" y1="215" x2="437" y2="282" class="ctr"/><line x1="404" y1="248" x2="470" y2="248" class="ctr"/>
  <text x="222" y="205" class="small">X20 Y20</text><text x="406" y="205" class="small">X50 Y20</text>
  <text x="130" y="110" class="small">70 x 40</text><text x="560" y="145" class="small">Z5</text>

  <text x="36" y="424" class="small">第一个孔中心为 X20 Y20；题目要求快速定位到该孔上方。</text>
</svg>