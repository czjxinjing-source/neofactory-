<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="760" height="460" viewBox="0 0 760 460">
  <rect width="760" height="460" fill="#fff"/>
  <style>
    .obj{fill:none;stroke:#111;stroke-width:3;stroke-linejoin:round;stroke-linecap:round}
    .dim{fill:none;stroke:#111;stroke-width:1.4;stroke-linecap:round}
    .ctr{fill:none;stroke:#111;stroke-width:1.2;stroke-dasharray:8 6}
    .txt{font-family:Arial,'Microsoft YaHei',sans-serif;font-size:20px;fill:#111}
    .small{font-family:Arial,'Microsoft YaHei',sans-serif;font-size:16px;fill:#111}
  </style>
  <text x="36" y="36" class="txt">两级台阶轴程序阅读</text>
  
  <line x1="90" y1="225" x2="650" y2="225" class="ctr"/>
  <path d="M160 195 H330 V172 H520 V278 H330 V255 H160 Z" class="obj"/>
  <text x="112" y="232" class="small">Ø20</text><text x="532" y="232" class="small">Ø30</text>
  <line x1="160" y1="305" x2="330" y2="305" class="dim"/><text x="228" y="330" class="small">20</text>
  <text x="150" y="170" class="small">Z0</text><text x="315" y="160" class="small">Z-20</text>

  <text x="36" y="424" class="small">N30 的 X20 Z-20 正好对应右段 Ø20、长 20 的切削。</text>
